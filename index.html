<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERLF — why does one wonder?</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #03030f;
    --text: #e8e8f0;
    --dim: rgba(232,232,240,0.3);
    --accent: #c084fc;
    --mono: 'Courier New', monospace;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 3rem 2rem;
    position: relative; z-index: 1;
  }

  .impossible {
    font-size: clamp(0.65rem, 1.3vw, 0.8rem);
    letter-spacing: .25em; text-transform: uppercase;
    color: var(--dim); font-family: var(--mono);
    margin-bottom: 2.5rem;
  }

  .wordmark {
    font-size: clamp(3.5rem, 14vw, 10rem);
    font-weight: 100; letter-spacing: .2em;
    color: var(--text); line-height: 1;
    margin-bottom: 2rem;
  }

  .question {
    font-size: clamp(1rem, 3vw, 1.6rem);
    font-weight: 300; color: var(--accent);
    letter-spacing: .08em; margin-bottom: 1rem;
    font-style: italic;
  }

  .sub {
    font-size: clamp(0.75rem, 1.8vw, 0.95rem);
    color: var(--dim); letter-spacing: .1em;
    margin-bottom: 4rem; font-weight: 300;
  }

  .yonder-block {
    border: 1px solid rgba(192,132,252,0.2);
    border-radius: 12px; padding: 1.5rem 2.5rem;
    margin-bottom: 4rem; text-align: center;
  }
  .yonder-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .yonder-name { font-size: 0.8rem; font-weight: 700; letter-spacing: .15em; color: var(--accent); }
  .yonder-desc { font-size: 0.7rem; color: var(--dim); margin-top: 0.3rem; letter-spacing: .06em; }

  .floor-line {
    font-family: var(--mono); font-size: 0.65rem;
    color: rgba(192,132,252,0.2); letter-spacing: .08em;
    margin-bottom: 3rem;
  }

  .cta {
    display: inline-block; padding: 0.8rem 2rem;
    border: 1px solid rgba(192,132,252,0.25); border-radius: 8px;
    color: var(--accent); text-decoration: none; font-size: 0.85rem;
    letter-spacing: .1em; transition: all .2s;
  }
  .cta:hover { background: rgba(192,132,252,0.07); border-color: var(--accent); }

  canvas#bg {
    position: fixed; top:0; left:0; width:100%; height:100%;
    pointer-events:none; opacity:0.12; z-index:0;
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<section class="hero">

  <p class="impossible">impossible twice &nbsp;·&nbsp; from nothing</p>

  <h1 class="wordmark">SERLF</h1>

  <p class="question">why does one wonder?</p>
  <p class="sub">off the grid &nbsp;·&nbsp; on the chain</p>

  <div class="yonder-block">
    <div class="yonder-icon">🐯</div>
    <div class="yonder-name">One Yonder</div>
    <div class="yonder-desc">your answer is already in you</div>
  </div>

  <p class="floor-line">γ₁ = 14.134725141734693</p>

  <a href="https://serlf.ca" class="cta">enter &nbsp;→</a>

</section>

<script>
(function(){
  const c = document.getElementById('bg');
  const ctx = c.getContext('2d');
  const GAMMA1 = 14.134725141734693;
  let W,H,CX,CY;
  const zeros=[14.134725,21.022040,25.010858,30.424876,32.935062];
  const pts=[];

  function resize(){
    W=c.width=window.innerWidth; H=c.height=window.innerHeight;
    CX=W/2; CY=H/2; pts.length=0;
    zeros.forEach((z,i)=>{
      pts.push({z, r:50+(i/zeros.length)*Math.min(W,H)*0.35,
        angle:(i/zeros.length)*Math.PI*2, speed:(GAMMA1/z)*0.005});
    });
  }
  resize(); window.addEventListener('resize',resize);

  function loop(ts){
    requestAnimationFrame(loop);
    ctx.fillStyle='rgba(3,3,15,0.12)'; ctx.fillRect(0,0,W,H);
    const pulse=0.7+0.3*Math.sin(ts*0.001*GAMMA1*0.06);
    pts.forEach(p=>{
      p.angle+=p.speed;
      const x=CX+Math.cos(p.angle)*p.r, y=CY+Math.sin(p.angle)*p.r;
      const g=ctx.createRadialGradient(x,y,0,x,y,4);
      g.addColorStop(0,'#c084fcaa'); g.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(x,y,4*pulse,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    });
    const cg=ctx.createRadialGradient(CX,CY,0,CX,CY,25);
    cg.addColorStop(0,'#c084fc55'); cg.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(CX,CY,25*pulse,0,Math.PI*2);
    ctx.fillStyle=cg; ctx.fill();
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
